<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IFA Annual 2026 · Monte Carlo Schedule</title>
<style>
:root{--blue:#003387;--green:#43B02A;--orange:#e67e22;--red:#c0392b;--border:#e0e0dc;--grey:#f5f5f3;--text:#1a1a1a;--text2:#555;--text3:#999;--white:#fff;--radius:12px;--rsm:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef0f4;color:var(--text);min-height:100vh;}
.topbar{background:var(--blue);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-title{font-size:16px;font-weight:700;letter-spacing:.02em;}
.tb-sub{font-size:11px;opacity:.65;margin-top:2px;}
.tb-btn{background:rgba(255,255,255,.18);border:none;border-radius:8px;color:#fff;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;}
.tb-btn:hover{background:rgba(255,255,255,.28);}
.day-nav{background:var(--white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.day-nav::-webkit-scrollbar{display:none;}
.day-tab{flex:1;min-width:58px;padding:10px 4px 8px;text-align:center;cursor:pointer;border-bottom:3px solid transparent;transition:border-color .15s;}
.day-tab .dow{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.day-tab .dom{font-size:17px;font-weight:500;color:var(--text2);margin-top:3px;line-height:1;}
.day-tab.active .dom{background:var(--blue);color:#fff;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;}
.day-tab.active{border-bottom-color:var(--blue);}
.search-wrap{padding:10px 14px 6px;background:var(--white);border-bottom:1px solid var(--border);}
.search-input{width:100%;border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:14px;background:var(--grey);color:var(--text);outline:none;}
.search-input:focus{border-color:var(--blue);}
.filter-strip{display:flex;gap:6px;padding:8px 14px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.fp{border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;background:var(--white);color:var(--text2);white-space:nowrap;transition:all .15s;}
.fp.active{color:#fff;}
.fp.all.active,.fp.meeting.active{background:var(--blue);border-color:var(--blue);}
.fp.meal.active{background:var(--green);border-color:var(--green);}
.fp.entertainment.active{background:var(--orange);border-color:var(--orange);}
.events-wrap{padding:12px 14px 110px;display:flex;flex-direction:column;gap:10px;min-height:200px;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:38px;margin-bottom:10px;}
.empty-text{font-size:14px;line-height:1.6;}
.ecard{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);border-left-width:4px;overflow:hidden;}
.ecard.Meeting{border-left-color:var(--blue);}
.ecard.Meal{border-left-color:var(--green);}
.ecard.Entertainment{border-left-color:var(--orange);}
.ecard.cancelled{opacity:.5;}
.ecard-head{padding:12px 14px 10px;cursor:pointer;}
.ecard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.ecard-title{font-size:15px;font-weight:700;color:var(--text);flex:1;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;}
.badge.Meeting{background:#e0e8f8;color:var(--blue);}
.badge.Meal{background:#e5f5de;color:#2a7018;}
.badge.Entertainment{background:#fef0e0;color:#9a5500;}
.badge.Confirmed{background:#e5f5de;color:#2a7018;}
.badge.Tentative{background:#fef0e0;color:#9a5500;}
.badge.Cancelled{background:#fde8e6;color:var(--red);}
.ecard-meta{font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px;}
.meta-dot{color:var(--border);}
.conflict-tag{font-size:10px;background:#fde8e6;color:var(--red);border-radius:6px;padding:2px 7px;font-weight:600;}
.people-row{display:flex;gap:5px;flex-wrap:wrap;}
.pchip{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600;}
.pchip.org{background:#e0e8f8;color:var(--blue);}
.pchip.att{background:var(--grey);color:var(--text2);}
.ecard-body{border-top:1px solid var(--border);padding:10px 14px 12px;display:none;}
.ecard-body.open{display:block;}
.notes-text{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:10px;}
.rsvp-section{margin-bottom:10px;}
.rsvp-label{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500;}
.rsvp-btns{display:flex;gap:6px;}
.rsvp-btn{border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;background:var(--white);color:var(--text2);}
.rsvp-btn.yes.active{background:var(--green);border-color:var(--green);color:#fff;}
.rsvp-btn.no.active{background:var(--red);border-color:var(--red);color:#fff;}
.rsvp-btn.maybe.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.rsvp-summary{font-size:11px;color:var(--text3);margin-top:5px;}
.card-actions{display:flex;gap:7px;flex-wrap:wrap;}
.act-btn{border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;background:var(--white);color:var(--text2);}
.act-btn:hover{background:var(--grey);}
.act-btn.blue{color:var(--blue);border-color:#c0ccec;}
.act-btn.danger{color:var(--red);border-color:#f5c6c3;}
.fab{position:fixed;bottom:26px;right:20px;width:56px;height:56px;background:var(--blue);border:none;border-radius:50%;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,51,135,.35);z-index:100;line-height:1;}
.fab:hover{background:#002270;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:93vh;overflow-y:auto;padding-bottom:40px;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:5;}
.modal-head-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.fg select,.fg input,.fg textarea{width:100%;border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;font-size:14px;background:var(--white);color:var(--text);outline:none;font-family:inherit;}
.fg select:focus,.fg input:focus,.fg textarea:focus{border-color:var(--blue);}
.fg textarea{resize:vertical;min-height:70px;}
.loc-custom{margin-top:8px;display:none;}
.loc-custom.show{display:block;}
.chip-group{display:flex;gap:8px;flex-wrap:wrap;}
.ctoggle{border:1px solid var(--border);border-radius:20px;padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer;background:var(--white);color:var(--text2);user-select:none;transition:all .12s;}
.ctoggle.sel{background:var(--blue);border-color:var(--blue);color:#fff;}
.modal-foot{padding:12px 18px 0;display:flex;gap:10px;}
.btn-save{flex:1;background:var(--blue);border:none;border-radius:var(--rsm);color:#fff;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-save:hover{background:#002270;}
.btn-cancel{border:1px solid var(--border);border-radius:var(--rsm);background:var(--white);color:var(--text2);padding:14px 18px;font-size:15px;cursor:pointer;}
.export-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
.export-row{display:flex;align-items:center;gap:10px;}
.export-row label{font-size:14px;color:var(--text2);white-space:nowrap;}
.export-row select{flex:1;border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;font-size:14px;outline:none;color:var(--text);}
.exp-btns{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.exp-btn{border:1px solid var(--border);border-radius:var(--rsm);padding:13px;font-size:14px;font-weight:600;cursor:pointer;background:var(--white);color:var(--text);text-align:center;}
.exp-btn.blue{background:var(--blue);border-color:var(--blue);color:#fff;}
.exp-btn.green{background:var(--green);border-color:var(--green);color:#fff;}
@media print{.fab,.topbar,.day-nav,.search-wrap,.filter-strip{display:none!important;}.ecard-body{display:block!important;}}
</style>

      <div class="fg">
        <label>Status</label>
        <select id="fStatus">
          <option>Confirmed</option>
          <option>Tentative</option>
          <option>Cancelled</option>
        </select>
      </div>

      <div class="fg">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Agenda items, dress code, links…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('addOverlay')">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="exportOverlay" onclick="overlayClick(event,'exportOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-head-title">Export Schedule</div>
      <button class="modal-close" onclick="closeModal('exportOverlay')">×</button>
    </div>
    <div class="export-body">
      <div class="export-row">
        <label>Scope:</label>
        <select id="exportScope">
          <option value="all">Full week (Jun 28 – Jul 2)</option>
          <option value="2025-06-28">Sunday 28 June only</option>
          <option value="2025-06-29">Monday 29 June only</option>
          <option value="2025-06-30">Tuesday 30 June only</option>
          <option value="2025-07-01">Wednesday 1 July only</option>
          <option value="2025-07-02">Thursday 2 July only</option>
        </select>
      </div>
      <div class="exp-btns">
        <button class="exp-btn green" onclick="exportCSV()">⬇ Download CSV</button>
        <button class="exp-btn blue" onclick="exportICS()">📅 Download .ics (Outlook / Calendar)</button>
        <button class="exp-btn" onclick="exportPDF()">🖨 Print / Save as PDF</button>
      </div>
    </div>
  </div>
</div>

<script>
const DAYS=[
  {label:'Sun',date:'2025-06-28',dom:'28'},
  {label:'Mon',date:'2025-06-29',dom:'29'},
  {label:'Tue',date:'2025-06-30',dom:'30'},
  {label:'Wed',date:'2025-07-01',dom:'1'},
  {label:'Thu',date:'2025-07-02',dom:'2'},
];
const KEY='purefert_v3';
let events=[], currentDay=DAYS[0].date, currentFilter='all', editingId=null;

/* ── FIREBASE CONFIG ───────────────────────────────────────────────────────
   Replace the values below with your own Firebase project config.
   Instructions: https://console.firebase.google.com → Project Settings → Your Apps
   ─────────────────────────────────────────────────────────────────────────── */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyADenOatrn3fUOff0Y6Ve3dvWKIEhtfDjM",
  authDomain: "ifa-annual-2026---monte-carlo.firebaseapp.com",
  databaseURL: "https://ifa-annual-2026---monte-carlo-default-rtdb.firebaseio.com",
  projectId: "ifa-annual-2026---monte-carlo",
  storageBucket: "ifa-annual-2026---monte-carlo.firebasestorage.app",
  messagingSenderId: "531070676578",
  appId: "1:531070676578:web:537fcaeeba69bcc265eb3b"
};

let db = null;
let firebaseReady = false;

function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseReady = true;
    // Listen for real-time updates from all users
    db.ref('purefert_events').on('value', (snapshot) => {
      const data = snapshot.val();
      events = data ? Object.values(data) : [];
      buildDayNav();
      renderEvents();
    });
    console.log('Firebase connected — real-time sync active');
  } catch(e) {
    console.warn('Firebase not configured — using local storage fallback:', e.message);
    firebaseReady = false;
    load_local();
  }
}

function load_local(){try{events=JSON.parse(localStorage.getItem(KEY))||[];}catch(e){events=[];}}

function load() {
  // load is called at init — Firebase handles it via listener above
  // For fallback (no Firebase), load from localStorage
  if (!firebaseReady) load_local();
}

function save() {
  if (firebaseReady && db) {
    // Save all events to Firebase as an object keyed by id
    const eventsObj = {};
    events.forEach(ev => { eventsObj[ev.id] = ev; });
    db.ref('purefert_events').set(eventsObj).catch(e => {
      console.warn('Firebase save failed, using localStorage fallback:', e);
      localStorage.setItem(KEY, JSON.stringify(events));
    });
  } else {
    localStorage.setItem(KEY, JSON.stringify(events));
  }
}

function buildDayNav(){
  const nav=document.getElementById('dayNav');
  nav.innerHTML='';
  DAYS.forEach(d=>{
    const t=document.createElement('div');
    t.className='day-tab'+(d.date===currentDay?' active':'');
    t.innerHTML=`<div class="dow">${d.label}</div><div class="dom">${d.dom}</div>`;
    t.onclick=()=>{currentDay=d.date;buildDayNav();renderEvents();};
    nav.appendChild(t);
  });
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fp').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderEvents();
}

function toMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function calcEnd(start,dur){
  const[h,m]=start.split(':').map(Number);
  const total=h*60+m+Number(dur);
  return String(Math.floor(total/60)%24).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
}
function fmtDur(mins){
  const m=Number(mins);
  if(m<60)return m+' min';
  const h=Math.floor(m/60),r=m%60;
  return h+'h'+(r?' '+r+' min':'');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function hasConflict(ev,dayEvs){
  const s1=toMins(ev.start),e1=s1+Number(ev.duration);
  return dayEvs.some(o=>o.id!==ev.id&&!(toMins(o.start)+Number(o.duration)<=s1||toMins(o.start)>=e1));
}

function renderEvents(){
  const wrap=document.getElementById('eventsWrap');
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=events.filter(e=>e.date===currentDay);
  if(currentFilter!=='all')list=list.filter(e=>e.type===currentFilter);
  if(q)list=list.filter(e=>[e.title,e.company,e.location,e.notes].some(v=>(v||'').toLowerCase().includes(q)));
  list.sort((a,b)=>a.start.localeCompare(b.start));
  if(!list.length){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No events for this day.<br>Tap + to add one.</div></div>';
    return;
  }
  const dayEvs=events.filter(e=>e.date===currentDay);
  wrap.innerHTML='';
  list.forEach(ev=>{
    const conflict=hasConflict(ev,dayEvs);
    const end=calcEnd(ev.start,ev.duration);
    const rsvp=ev.rsvp||{};
    const yes=Object.values(rsvp).filter(v=>v==='yes').length;
    const no=Object.values(rsvp).filter(v=>v==='no').length;
    const maybe=Object.values(rsvp).filter(v=>v==='maybe').length;
    const orgChips=(ev.organizers||[]).map(o=>`<span class="pchip org">${o}</span>`).join('');
    const attChips=(ev.presence||[]).map(p=>`<span class="pchip att">${p}</span>`).join('');
    const card=document.createElement('div');
    card.className=`ecard ${ev.type}${ev.status==='Cancelled'?' cancelled':''}`;
    card.innerHTML=`
      <div class="ecard-head" onclick="toggleCard('${ev.id}')">
        <div class="ecard-top">
          <div class="ecard-title">${esc(ev.title||'Untitled')}</div>
          <span class="badge ${ev.type}">${ev.type}</span>
        </div>
        <div class="ecard-meta">
          <span>${ev.start} – ${end}</span>
          <span class="meta-dot">·</span><span>${fmtDur(ev.duration)}</span>
          ${ev.company?`<span class="meta-dot">·</span><span><strong>${esc(ev.company)}</strong></span>`:''}
          ${conflict?'<span class="conflict-tag">⚠ Conflict</span>':''}
          <span class="meta-dot">·</span><span class="badge ${ev.status||'Confirmed'}">${ev.status||'Confirmed'}</span>
        </div>
        ${ev.location?`<div style="font-size:12px;color:var(--text3);margin-bottom:6px;">📍 ${esc(ev.location)}</div>`:''}
        ${(orgChips||attChips)?`<div class="people-row">${orgChips}${attChips}</div>`:''}
      </div>
      <div class="ecard-body" id="body-${ev.id}">
        ${ev.notes?`<div class="notes-text">${esc(ev.notes)}</div>`:''}
        <div class="rsvp-section">
          <div class="rsvp-label">Your RSVP</div>
          <div class="rsvp-btns">
            <button class="rsvp-btn yes${rsvp['me']==='yes'?' active':''}" onclick="setRSVP('${ev.id}','yes')">✓ Yes</button>
            <button class="rsvp-btn maybe${rsvp['me']==='maybe'?' active':''}" onclick="setRSVP('${ev.id}','maybe')">? Maybe</button>
            <button class="rsvp-btn no${rsvp['me']==='no'?' active':''}" onclick="setRSVP('${ev.id}','no')">✗ No</button>
          </div>
          <div class="rsvp-summary">${yes} yes · ${maybe} maybe · ${no} no</div>
        </div>
        <div class="card-actions">
          <button class="act-btn blue" onclick="editEvent('${ev.id}')">✏ Edit</button>
          <button class="act-btn blue" onclick="dlICS('${ev.id}')">📅 Add to Outlook</button>
          <button class="act-btn danger" onclick="deleteEvent('${ev.id}')">🗑 Delete</button>
        </div>
      </div>`;
    wrap.appendChild(card);
  });
}

function toggleCard(id){document.getElementById('body-'+id).classList.toggle('open');}

function setRSVP(id,val){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  if(!ev.rsvp)ev.rsvp={};
  ev.rsvp['me']=ev.rsvp['me']===val?null:val;
  save();renderEvents();
  document.getElementById('body-'+id).classList.add('open');
}

function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='New Event';
  document.getElementById('editId').value='';
  document.getElementById('fDate').value=currentDay;
  document.getElementById('fType').value='Meeting';
  document.getElementById('fTitle').value='';
  document.getElementById('fCompany').value='';
  document.getElementById('fStartH').value='09';
  document.getElementById('fStartM').value='00';
  document.getElementById('fDuration').value='60';
  document.getElementById('fLocSelect').value='Fairmont – PureFert Suite #TBC';
  document.getElementById('fLocCustom').value='';
  document.getElementById('locCustomWrap').classList.remove('show');
  document.getElementById('fStatus').value='Confirmed';
  document.getElementById('fNotes').value='';
  document.querySelectorAll('#organizerGroup .ctoggle,#presenceGroup .ctoggle').forEach(b=>b.classList.remove('sel'));
  document.getElementById('addOverlay').classList.add('open');
}

function editEvent(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Edit Event';
  document.getElementById('editId').value=id;
  document.getElementById('fDate').value=ev.date;
  document.getElementById('fType').value=ev.type;
  document.getElementById('fTitle').value=ev.title||'';
  document.getElementById('fCompany').value=ev.company||'';
  const[sh,sm]=(ev.start||'09:00').split(':');
  document.getElementById('fStartH').value=sh;
  document.getElementById('fStartM').value=sm;
  document.getElementById('fDuration').value=ev.duration;
  const presets=['Fairmont – PureFert Suite #TBC','Hôtel de Paris – PureFert Suite #TBC'];
  if(presets.includes(ev.location)){
    document.getElementById('fLocSelect').value=ev.location;
    document.getElementById('locCustomWrap').classList.remove('show');
  }else{
    document.getElementById('fLocSelect').value='custom';
    document.getElementById('fLocCustom').value=ev.location||'';
    document.getElementById('locCustomWrap').classList.add('show');
  }
  document.getElementById('fStatus').value=ev.status||'Confirmed';
  document.getElementById('fNotes').value=ev.notes||'';
  document.querySelectorAll('#organizerGroup .ctoggle').forEach(b=>b.classList.toggle('sel',(ev.organizers||[]).includes(b.dataset.val)));
  document.querySelectorAll('#presenceGroup .ctoggle').forEach(b=>b.classList.toggle('sel',(ev.presence||[]).includes(b.dataset.val)));
  document.getElementById('addOverlay').classList.add('open');
}

function saveEvent(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){alert('Please enter a title.');return;}
  const locSel=document.getElementById('fLocSelect').value;
  const location=locSel==='custom'?document.getElementById('fLocCustom').value.trim():locSel;
  const organizers=[...document.querySelectorAll('#organizerGroup .ctoggle.sel')].map(b=>b.dataset.val);
  const presence=[...document.querySelectorAll('#presenceGroup .ctoggle.sel')].map(b=>b.dataset.val);
  const startH=document.getElementById('fStartH').value;
  const startM=document.getElementById('fStartM').value;
  const startTime=startH+':'+startM;
  const id=editingId||Date.now().toString(36)+Math.random().toString(36).slice(2);
  const ev={
    id,
    date:document.getElementById('fDate').value,
    type:document.getElementById('fType').value,
    title,
    company:document.getElementById('fCompany').value.trim(),
    start:startTime,
    duration:document.getElementById('fDuration').value,
    location,organizers,presence,
    status:document.getElementById('fStatus').value,
    notes:document.getElementById('fNotes').value.trim(),
    rsvp:editingId?(events.find(e=>e.id===editingId)||{}).rsvp||{}:{},
  };
  if(editingId){const i=events.findIndex(e=>e.id===editingId);if(i>-1)events[i]=ev;}
  else events.push(ev);
  save();closeModal('addOverlay');
  currentDay=ev.date;buildDayNav();renderEvents();
}

function deleteEvent(id){
  if(!confirm('Delete this event?'))return;
  events=events.filter(e=>e.id!==id);
  save();renderEvents();
}

function handleLocChange(){
  document.getElementById('locCustomWrap').classList.toggle('show',document.getElementById('fLocSelect').value==='custom');
}
function toggleChip(btn){btn.classList.toggle('sel');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function overlayClick(e,id){if(e.target===document.getElementById(id))closeModal(id);}
function openExport(){document.getElementById('exportOverlay').classList.add('open');}

function scopedEvents(){
  const s=document.getElementById('exportScope').value;
  return s==='all'?[...events]:events.filter(e=>e.date===s);
}

function exportCSV(){
  const list=scopedEvents().sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
  const hdr=['Date','Type','Title','Company','Start','End','Duration','Location','Organizers','Requested Presence','Status','Notes'];
  const rows=list.map(e=>[
    e.date,e.type,e.title,e.company||'',e.start,calcEnd(e.start,e.duration),fmtDur(e.duration),
    e.location,(e.organizers||[]).join(';'),(e.presence||[]).join(';'),e.status,e.notes||''
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`));
  dl('PureFert_Schedule.csv','text/csv',[hdr.join(','),...rows.map(r=>r.join(','))].join('\n'));
}

function icsDate(date,time){
  const[y,mo,d]=date.split('-');const[h,m]=time.split(':');
  return `${y}${mo}${d}T${h}${m}00`;
}

function buildICS(list){
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//PureFert Schedule//EN','CALSCALE:GREGORIAN'];
  list.forEach(ev=>{
    const end=calcEnd(ev.start,ev.duration);
    lines.push('BEGIN:VEVENT',
      `UID:${ev.id}@purefert`,
      `DTSTART:${icsDate(ev.date,ev.start)}`,
      `DTEND:${icsDate(ev.date,end)}`,
      `SUMMARY:${ev.title||'Untitled'}${ev.company?' ('+ev.company+')':''}`,
      `LOCATION:${ev.location||''}`,
      `DESCRIPTION:Organizers: ${(ev.organizers||[]).join(', ')}\\nPresence: ${(ev.presence||[]).join(', ')}\\n${ev.notes||''}`,
      `STATUS:${ev.status==='Cancelled'?'CANCELLED':'CONFIRMED'}`,
      'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function dlICS(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  dl((ev.title||'Event').replace(/\s+/g,'_')+'.ics','text/calendar',buildICS([ev]));
}
function exportICS(){dl('PureFert_Schedule.ics','text/calendar',buildICS(scopedEvents()));}
function exportPDF(){closeModal('exportOverlay');window.print();}

function dl(filename,mime,content){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=filename;a.click();
}

// Touch swipe between days
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)<60)return;
  const i=DAYS.findIndex(d=>d.date===currentDay);
  if(dx<0&&i<DAYS.length-1)currentDay=DAYS[i+1].date;
  else if(dx>0&&i>0)currentDay=DAYS[i-1].date;
  buildDayNav();renderEvents();
},{passive:true});

// Populate 24h hour dropdown (00–23)
(function(){
  const hSel=document.getElementById('fStartH');
  const mSel=document.getElementById('fStartM');
  for(let h=0;h<24;h++){
    const o=document.createElement('option');
    o.value=String(h).padStart(2,'0');
    o.textContent=String(h).padStart(2,'0');
    hSel.appendChild(o);
  }
  for(let m=0;m<60;m+=15){
    const o=document.createElement('option');
    o.value=String(m).padStart(2,'0');
    o.textContent=String(m).padStart(2,'0');
    mSel.appendChild(o);
  }
  hSel.value='09';
  mSel.value='00';
})();
initFirebase();
// If Firebase not configured, load from localStorage immediately
setTimeout(()=>{ if(!firebaseReady){ load_local(); buildDayNav(); renderEvents(); } }, 600);
</script>
</body>
</html>
